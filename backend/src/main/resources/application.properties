server.port=7727
spring.application.name=backend
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Логи валидации
logging.level.com.example.backend=DEBUG

# Правила ФТ (включение/выключение, параметры ft21): см. classpath:checks-config.json
vkr.checks.resource=classpath:checks-config.json

vkr.validation.queue.core-pool-size=2
vkr.validation.queue.max-pool-size=4
vkr.validation.queue.queue-capacity=32
vkr.validation.job-terminal-ttl-hours=1
vkr.validation.job-cleanup-interval-ms=600000

# Рейт-лимит (скользящее окно, in-memory) только для POST /v1/validate
vkr.rate-limit.enabled=true
vkr.rate-limit.max-requests-per-window=60
vkr.rate-limit.window-seconds=60
# За прокси/ingress с подстановкой X-Forwarded-For — включить true (иначе подделка заголовка снаружи)
vkr.rate-limit.trust-x-forwarded-for=false
