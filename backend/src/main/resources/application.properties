spring.application.name=backend
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Логи валидации: INFO — этапы и миллисекунды; DEBUG для пакета check.runner — время каждого ФТ (ft4…ft21).
# MDC jobId в потоке воркера: раскомментируй pattern, чтобы видеть jobId в каждой строке.
# logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%t] [%X{jobId:-}] %logger{36} - %m%n
logging.level.com.example.backend=DEBUG
# logging.level.com.example.backend.check.runner=DEBUG

# Правила ФТ (включение/выключение, параметры ft21): см. classpath:checks-config.json
vkr.checks.resource=classpath:checks-config.json

vkr.validation.queue.core-pool-size=2
vkr.validation.queue.max-pool-size=4
vkr.validation.queue.queue-capacity=32
vkr.validation.job-terminal-ttl-hours=1
vkr.validation.job-cleanup-interval-ms=600000
