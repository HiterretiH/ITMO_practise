<p-card styleClass="results-shell results-footnote-card">
  <ng-template pTemplate="title">
    <div class="results-footnote__title">
      <i class="pi pi-info-circle results-footnote__title-icon" aria-hidden="true"></i>
      <span>Требования к оформлению</span>
    </div>
  </ng-template>
  <p class="results-footnote__text">
    Официальные требования к оформлению ВКР:
    <a
      href="https://student.itmo.ru/files/1314"
      target="_blank"
      rel="noopener noreferrer"
      class="results-footnote__link"
    >
      PDF на портале ИТМО
      <i class="pi pi-external-link results-footnote__ext" aria-hidden="true"></i>
    </a>
  </p>
</p-card>
