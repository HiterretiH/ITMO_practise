<app-header></app-header>
<p-toast />

<div class="page">
  <div class="page-inner">
    <p-card header="Проверка документа ВКР">
      <p class="page-lead">
        Загрузите файл в формате .docx. Сервис проверит структуру и оформление по требованиям ИТМО и покажет
        подробный отчёт.
      </p>

      @if (loading) {
        <div class="loading-block">
          <p-progressSpinner strokeWidth="4" ariaLabel="Проверка" />
          <span>Выполняется проверка документа…</span>
        </div>
      }

      <p-fileUpload
        #fileUpload
        name="file"
        [customUpload]="true"
        (uploadHandler)="onUpload($event)"
        (onSelect)="onQueueChanged()"
        (onClear)="onQueueChanged()"
        (onRemove)="onQueueChanged()"
        [multiple]="false"
        accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        [maxFileSize]="20000000"
        [disabled]="loading"
        [chooseLabel]="'Выбрать файл'"
        [uploadLabel]="'Проверить'"
        [cancelLabel]="'Отмена'"
        [showUploadButton]="true"
        [showCancelButton]="true"
        [uploadButtonProps]="uploadButtonProps"
        [cancelButtonProps]="cancelButtonProps"
        chooseIcon="pi pi-file-word"
        uploadIcon="pi pi-check"
        cancelIcon="pi pi-times"
      />

      <p class="hint">Поддерживается только .docx. Максимальный размер — 50 МБ.</p>
    </p-card>
  </div>
</div>
