<div class="progress" *ngIf="status !== 'idle'">
  <p>
    <ng-container [ngSwitch]="status">
      <span *ngSwitchCase="'uploading'">Загрузка...</span>
      <span *ngSwitchCase="'analyzing'">Анализ документа...</span>
      <span *ngSwitchCase="'done'">Проверка завершена.</span>
    </ng-container>
  </p>
  <p-progressBar
    [value]="status === 'uploading' ? 30 : status === 'analyzing' ? 70 : 100"
    [showValue]="false"
  ></p-progressBar>
</div>
